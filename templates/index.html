<!DOCTYPE html>
<html>
<head>
    <title>AjiraScan</title>
</head>
<body>

<h1>AjiraScan ATS Scanner</h1>

<form
method="POST"
action="/analyze"
enctype="multipart/form-data">

<textarea
name="cv"
rows="12"
cols="60"
placeholder="Paste CV here"></textarea>

<br><br>

<p>Or upload CV file (.txt)</p>

<input
type="file"
name="cvfile">

<br><br>

<textarea
name="job"
rows="12"
cols="60"
placeholder="Paste Job Description here"></textarea>

<br><br>

<button type="submit">
Analyze CV
</button>

</form>

<hr>

<h2>ATS Result</h2>

<p><strong>Score:</strong> {{.Score}}</p>

<p><strong>Job Type:</strong> {{.JobType}}</p>

<!-- STEP 64 CHANGE STARTS HERE -->

<h3>Matched Keywords</h3>

<ul>
{{range .Matched}}
<li>{{.}}</li>
{{end}}
</ul>

<h3>Missing Keywords</h3>

<ul>
{{range .Missing}}
<li>{{.}}</li>
{{end}}
</ul>

<!-- STEP 64 CHANGE ENDS HERE -->

</body>
</html>
